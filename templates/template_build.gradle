ext {
    extName = 'MySite' // CHANGE FOR NEW WEBSITE
    pkgNameSuffix = 'en.mysite' // CHANGE FOR NEW WEBSITE (framework prepends base package)
    extClass = '.MySite' // CHANGE FOR NEW WEBSITE
    extVersionCode = 1
    isNsfw = false
}

// DO NOT MODIFY: Use the modern legacy extension plugin (replaces common.gradle and kotlin-android)
apply plugin: "keiyoushi.plugins.extension.legacy"
apply plugin: 'kotlinx-serialization'

dependencies {
